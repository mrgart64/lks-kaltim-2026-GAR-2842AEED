services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: kaltim-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AWS_LEX_BOT_ID: ${AWS_LEX_BOT_ID:-}
      AWS_LEX_BOT_ALIAS_ID: ${AWS_LEX_BOT_ALIAS_ID:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      REDIS_HOST: ${REDIS_HOST:-cache}
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - app-storage:/var/www/storage
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: kaltim-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/storage:ro
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: kaltim-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: kaltim-cache
    restart: unless-stopped
    volumes:
      - cache-data:/data
    networks:
      - app-network

volumes:
  db-data:
  cache-data:
  app-storage:

networks:
  app-network:
    driver: bridge
